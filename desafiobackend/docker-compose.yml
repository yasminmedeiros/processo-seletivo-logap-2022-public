version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: desafiobackend-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: desafiobackend
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: desafiobackend-keycloak
    command: ["start-dev", "--http-port=8081", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8081"
    volumes:
      - ./docker/keycloak/realm-desafio-logap.json:/opt/keycloak/data/import/realm-desafio-logap.json

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desafiobackend-app
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/desafiobackend?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      LIQUIBASE_ENABLED: "true"
      SECURITY_AUTH_ENABLED: "true"
      KEYCLOAK_ISSUER_URI: http://keycloak:8081/realms/desafio-logap
      KEYCLOAK_JWK_SET_URI: http://keycloak:8081/realms/desafio-logap/protocol/openid-connect/certs
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../desafiofrontend
      dockerfile: Dockerfile
    container_name: desafiobackend-frontend
    depends_on:
      - backend
    environment:
      API_URL: http://localhost:8080
      KEYCLOAK_URL: http://localhost:8081
      KEYCLOAK_REALM: desafio-logap
      KEYCLOAK_CLIENT_ID: desafiobackend-api
    ports:
      - "4200:4200"
