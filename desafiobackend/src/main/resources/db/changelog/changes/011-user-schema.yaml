databaseChangeLog:
  - changeSet:
      id: 011-create-app-user-table
      author: Yasmin Medeiros
      validCheckSum:
        - 8:d8f8ea4d613c2ea97394a53cdda348ca
        - 8:9f7b7ee6d4657ca1691e4d86dda6643e
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_app_user
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_app_user_username
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  constraints:
                    nullable: false
