databaseChangeLog:
  - changeSet:
      id: 013-rename-password-to-password-hash
      author: Yasmin Medeiros
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: app_user
            columnName: password
      changes:
        - renameColumn:
            tableName: app_user
            oldColumnName: password
            newColumnName: password_hash
            columnDataType: VARCHAR(255)
        - sql:
            dbms: mysql
            sql: >
              UPDATE app_user
              SET password_hash = '$2b$10$imIBhG.Tl7idLETGizJZ0uHlBgTSwcHic/JL9GlMpB.V9DDA6Qs/O'
              WHERE username = 'user';
