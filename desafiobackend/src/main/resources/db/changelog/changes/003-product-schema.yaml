databaseChangeLog:
  - changeSet:
      id: 003-create-product-schema
      author: Yasmin Medeiros
      changes:
        - sql:
            dbms: mysql
            sql: |
              CREATE TABLE IF NOT EXISTS product (
                id BIGINT NOT NULL AUTO_INCREMENT,
                name VARCHAR(255),
                value_send FLOAT,
                value_buy FLOAT,
                quantity INT,
                quantity_minimum INT,
                category_id BIGINT NOT NULL,
                provider_id BIGINT NOT NULL,
                PRIMARY KEY (id),
                CONSTRAINT fk_product_category FOREIGN KEY (category_id) REFERENCES category(id) ON DELETE CASCADE,
                CONSTRAINT fk_product_provider FOREIGN KEY (provider_id) REFERENCES provider(id) ON DELETE CASCADE
              );
