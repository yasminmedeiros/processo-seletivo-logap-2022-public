name: Backend CI

on:
  push:
    paths:
      - desafiobackend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - desafiobackend/**
      - .github/workflows/backend-ci.yml

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desafiobackend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and test
        run: ./gradlew clean test build --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            desafiobackend/build/reports/tests/test
            desafiobackend/build/test-results/test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: desafiobackend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t desafiobackend:ci .
